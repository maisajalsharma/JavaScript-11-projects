<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love calculator</title>
</head>
<body  style="background-color: #F9429E; color: aliceblue; display: flex; justify-content: center; align-items: center;">
    <div id="parent">
    <h1>Love calculator</h1>
    <br> <br>
    <form  >
      
      <label for="boy" style="cursor: pointer;">Boy : </label>
      <input type="text" id="boy" name="boy" required style="cursor: pointer;">
      <br> <br>
      <label for="girl" style="cursor: pointer;">Girl : </label>
      <input type="text" id="girl" name="Girl" required style="cursor: pointer;">
      <br> <br>
      <button type="submit" style="cursor: pointer; background-color: rgb(247, 169, 228);">Calculate</button>
      
    </form>
       <br> <br>
    <h2>Result :</h2>
    </div>
</body>
<script src="./lovecalcutor.js"></script>
</html>
